<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma galerie photo du cameroun</title>
</head>
<body>
    <h1>Ma galeire photo du Cameroun </h1>
    <p>
        Bienvenue dans ma galerie photo dedie au cameroun.le Cameroun est un pays ,<br>
        de l'Afrique centrale connu pour sa grande diversite de.
    </p>
    <section>
        <h2>Paysages</h2>
        <figure>
            <img src="./mont-cameroun.png" alt="Vue spectaculaire du mont Cameroun" width="500" height="300">

            <img src="./chute-lobe.webp" alt="les chutes de la lobe cameroun" width="500" height="300">
            <figcaption>Le mont Cameroun et les chutes de la lobe pres de kribi </figcaption>
        </figure>
    </section>

    <section>
        <h2>Villes</h2>
        <figure>
            <img src="./yaounde.webp" alt="Vue panoramique de yaounde avec ses collines" width="500" height="300">
            <img src="./douala.webp" alt="vue urbaine de Douala " width="500" height="300">
            <figcaption>Yaounde la capitale politique du Cameroun Douala capitale economique du Cameroun </figcaption>
        </figure>
    </section>

    <section>
        <h2>Culture</h2>
        <figure>
            <img src="./danse-traditionel.webp" alt="Danseur camerounais en costumes traditionnels " width="500" height="300">
            <img src="./marche-local.webp" alt="Marches local camerounais avec vendeurs"  width="500" height="300">
            <figcaption>Danse traditionnelle camerounaise lors d'une ceremonie Un marche local refletant la vie quotidienne et la culture camerounais </figcaption>
        </figure>
    </section>
</body>
</html>
