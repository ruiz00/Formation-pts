<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de Contact Professionel</title>
</head>
<body>
    <form>
        <fieldset>
            <label for="">Nom</label>
            <input type="text" placeholder="Nyagha"><br>
            <label>Prenom</label>
            <input type="text" placeholder="bryan"><br>
            <label>Telephone</label>
            <input type="tel" name="" id="" placeholder="+237657116168"><br>
            <label>Entreprise</label>
            <input type="text" placeholder="SoftHard Solutions"><br>
            <label>Objet du Message</label>
            <select>
                <option>sdsa</option>
                <option>dwwd</option>
                <option>sda</option>
                <option>dwqdwqd</option>
                <option>dedjqldke</option>
            </select><br>
            <label>Message</label>
            <textarea rows="8" cols="20"></textarea><br>
            <fieldset>
                <legend>Niveau d'urgence</legend>
                <label>normal</label>
                <input type="radio" name="urgence">
                <label>urgent</label>
                <input type="radio" name="urgence">
                <label>Tres urgent</label>
                <input type="radio" name="urgence">
            </fieldset><br>
           <fieldset>
                <legend>Preference de Contact </legend>
                <label>normal</label>
                <input type="radio" name="urgence1">
                <label>urgent</label>
                <input type="radio" name="urgence2">
                <label>Tres urgent</label>
                <input type="radio" name="urgence3">
            </fieldset><br>
            <label>Date souhaite pour rappel</label>
            <input type="date"><br>
            <label>Heures de disponibilte</label>
            <input type="time"><br>
            <label>Upload File</label>
            <input type="file" accept=".pdf.doc.docx.xls"><br>

        </fieldset>
    </form>
</body>
</html>
